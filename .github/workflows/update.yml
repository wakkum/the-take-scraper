name: Daily Scraper Update

on:
  schedule:
    # Run every day at 06:00 UTC (09:00 AM Doha time)
    - cron: '0 6 * * *'
  workflow_dispatch: # Allows manual triggering from the GitHub interface

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }} # Needed to push changes back

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run daily update script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python daily_update.py

      - name: Commit and push if data changed
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add the_take_guests.json The-Take-Explorer-Embedded.html index.html
          git commit -m "Automated daily scrape update" || echo "No new episodes found today."
          git push
